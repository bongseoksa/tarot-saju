<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>오늘의 타로 - 점하나</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Google Fonts: Public Sans -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Config injected with Brand Tokens -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
              "brand": {
                "primary": "#6B38D4",
                "primary-light": "#EDE5FA",
                "primary-dark": "#4A1FA8",
                "bg": "#FEF7FF",
                "surface": "#FFFFFF",
                "text": "#1A1523",
                "text-sec": "#6B6078",
                "text-ter": "#9E95A9",
                "border": "#E8E0F0"
              }
            },
            "borderRadius": {
                    "DEFAULT": "0.5rem",
                    "lg": "1rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "spacing": {},
            "fontFamily": {
                    "headline": ["Public Sans", "sans-serif"],
                    "display": ["Public Sans", "sans-serif"],
                    "body": ["Public Sans", "sans-serif"],
                    "label": ["Public Sans", "sans-serif"]
            },
            "fontSize": {}
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom scrollbar hiding for cleaner look */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen font-body antialiased">
<!-- Mobile Device Container (390x844) -->
<div class="w-[390px] h-[844px] bg-brand-bg relative overflow-hidden flex flex-col shadow-2xl rounded-3xl border border-brand-border ring-1 ring-black/5">
<!-- TopAppBar -->
<header class="flex items-center justify-between px-4 h-14 shrink-0 bg-brand-bg/90 backdrop-blur-sm z-20">
<button aria-label="뒤로가기" class="text-brand-text w-10 h-10 flex items-center justify-center -ml-2 rounded-full hover:bg-brand-primary-light transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg text-brand-text absolute left-1/2 -translate-x-1/2">오늘의 타로</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Scrollable Content -->
<main class="flex-1 overflow-y-auto hide-scrollbar pb-28 relative">
<!-- Instruction Area -->
<section class="px-5 pt-4 pb-6 flex items-end gap-3">
<div class="w-20 h-20 shrink-0 relative">
<img alt="3D render of the lavender mochi mascot with a witch hat" class="w-full h-full object-contain drop-shadow-sm" data-alt="A clean, flat 2D vector illustration of JeomHana, a cute teardrop-shaped mochi mascot in muted lavender (#A78BDB). The character wears a dark purple pointed witch hat. Its face shows an excited expression with wide sparkling eyes and a tiny 'o' shaped mouth, with soft pink blush on the cheeks. The background is pure white. The style matches modern Korean character emoticons." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCVNv_qUMtU7WI6ghUnJuW2vk6kwT4tNLQAB3vGEDHDXSjkNZOpeicty_NvklWKZbrcSD8Ywt0inCvL93dnUJEMnkDWz7ymPvNT0uE_8EZgYpSmMAzdB1Vd5_mncc7eIOCh9gA7067RGjrdtE0-bXaAILJaeAWmuVhNPjYa9LTjScUQ2lDtws5VhPCqiNaarzyyrhZCpQFzjroVlN6rTkJ6rHdwt4LaIXG-sr2cyXfGbWQ7KFTlwqfWbvJR03eyvoVzYWMa-veL8Kg"/>
</div>
<div class="bg-brand-surface py-3 px-4 rounded-2xl rounded-bl-none shadow-sm border border-brand-border mb-2 relative">
<p class="font-headline font-bold text-brand-text text-[15px] leading-snug">
                        세 장의 카드를<br/>신중하게 골라주세요
                    </p>
<!-- Speech bubble tail -->
<div class="absolute -left-2 bottom-0 w-4 h-4 bg-brand-surface border-l border-b border-brand-border transform skew-x-12"></div>
</div>
</section>
<!-- Card Slots -->
<section class="px-5 mb-8">
<div class="flex justify-between gap-4">
<!-- Slot 1: 과거 (Selected) -->
<div class="flex-1 flex flex-col items-center gap-2">
<div class="w-full aspect-[2/3] bg-brand-primary rounded-xl shadow-md border-2 border-brand-primary relative overflow-hidden flex items-center justify-center">
<!-- Card Back Pattern for Selected Slot -->
<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 12px 12px;"></div>
<div class="w-10 h-16 border border-white/30 rounded-md absolute"></div>
<span class="material-symbols-outlined text-white/50 text-2xl">auto_awesome</span>
</div>
<span class="text-sm font-bold text-brand-primary">과거</span>
</div>
<!-- Slot 2: 현재 (Empty) -->
<div class="flex-1 flex flex-col items-center gap-2">
<div class="w-full aspect-[2/3] border-2 border-dashed border-brand-primary rounded-xl bg-brand-primary-light/20 flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-brand-primary/40 text-3xl">add</span>
</div>
<span class="text-sm font-medium text-brand-text-sec">현재</span>
</div>
<!-- Slot 3: 미래 (Empty) -->
<div class="flex-1 flex flex-col items-center gap-2">
<div class="w-full aspect-[2/3] border-2 border-dashed border-brand-primary rounded-xl bg-brand-primary-light/20 flex items-center justify-center transition-colors">
<span class="material-symbols-outlined text-brand-primary/40 text-3xl">add</span>
</div>
<span class="text-sm font-medium text-brand-text-sec">미래</span>
</div>
</div>
</section>
<!-- Card Grid -->
<section class="px-5 bg-brand-surface rounded-t-[32px] pt-8 pb-8 min-h-[400px] shadow-[0_-4px_20px_rgba(0,0,0,0.03)] border-t border-brand-border">
<div class="grid grid-cols-4 gap-3">
<!-- Item 1 (Selected State) -->
<button class="aspect-[2/3] bg-brand-primary rounded-lg relative overflow-hidden flex items-center justify-center shadow-sm opacity-40 grayscale transition-transform pointer-events-none">
<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 10px 10px;"></div>
<div class="w-8 h-12 border border-white/20 rounded absolute"></div>
<!-- Checkmark Overlay -->
<div class="absolute inset-0 bg-black/20 flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[32px]" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
<!-- Items 2-22 (Unselected State) -->
<!-- Generative Loop Simulation -->
<script>
                        for(let i=0; i<21; i++) {
                            document.write(`
                                <button class="aspect-[2/3] bg-brand-primary rounded-lg relative overflow-hidden flex items-center justify-center shadow-sm hover:-translate-y-1 transition-transform active:scale-95">
                                    <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 10px 10px;"></div>
                                    <div class="w-8 h-12 border border-white/20 rounded absolute"></div>
                                    <span class="material-symbols-outlined text-white/40 text-xl">auto_awesome</span>
                                </button>
                            `);
                        }
                    </script>
</div>
</section>
</main>
<!-- Sticky Bottom Bar -->
<div class="absolute bottom-0 left-0 w-full px-5 pb-8 pt-6 bg-gradient-to-t from-brand-bg via-brand-bg to-transparent z-30">
<button class="w-full h-14 bg-gray-200 text-brand-text-ter font-bold text-lg rounded-xl flex items-center justify-center transition-colors cursor-not-allowed" disabled="">
                점 보기 (1/3)
            </button>
</div>
</div>
</body></html>
