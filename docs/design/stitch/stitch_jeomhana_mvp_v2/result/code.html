<body class="bg-background text-[#1A1523] min-h-screen pb-24 flex flex-col items-center">

<div class="flex flex-col items-center flex-1 bg-surface rounded-xl p-3 shadow-sm border border-default">

<div class="w-14 h-20 bg-card-frame rounded flex items-center justify-center mb-2 overflow-hidden relative">
<img alt="The Fool Tarot Card" class="object-cover w-full h-full opacity-90" data-alt="A beautifully illustrated tarot card showing 'The Fool'. The artwork is in a modern, clean, lightly mystical Korean editorial style. Bright, calm colors with soft lighting. The card has an antique mustard border." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCuyucSlVS6yBAZ-0ql4DA5Nut-V05ReWR74iFtmlM-hZj-4lDAU2AjjhTQQG6Qy7iNZevopQCo9aNbtu_m8f7R9A9lSjQzaDZ7vIGgTMhXn5VCMQvArYicTx7dbi3YvaXjng2q591HDrr72QmqCNlHJtInU5Bxd4R3hJgihPPJd4v27w7E2Thrpzsl9NHZ4lB9JKdmhQx0B3P8_72k6qRlg7UepJ74zIoUanKxG3W0ggDwe7PCaD9wV4NB5n6D6GrRrjykEYUvLfk"/>
</div>
<span class="font-body text-sm font-bold text-[#1A1523]">바보</span>
<span class="font-label text-[10px] text-cta mt-1 px-1.5 py-0.5 bg-cta-light rounded">역방향</span>
</div>
<!-- Future Card -->

<img alt="The Star Tarot Card" class="object-cover w-full h-full opacity-90" data-alt="A beautifully illustrated tarot card showing 'The Star'. The artwork is in a modern, clean, lightly mystical Korean editorial style. Bright, calm colors with soft lighting. The card has an antique mustard border." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC20M_QBWvgQxBi7yRjpSj4Ni4duzf69BlODbIaAP1-KHjixUHQIIBYkNsX-5yNR5kikOtaQNZskvIoXhs6RZ7nKDRO0OhgYPQJG10oQTrFUPvctQNmlOtegyAT1a0rxvBneAdAbJ0AGjWLoTBWZLS2quPOfBdWzsRlSNa3asSO0cJIwXE8a_Hy24VM7uyFzlACyVE0Zb6YwaKFsJwd9TNhrQatUsF71OiBPthc7KDfdR0HLcEO2VLZcKqkYLxSMAdPsLt1dIveiMY"/>

<span class="font-body text-sm font-bold text-[#1A1523]">별</span>
<span class="font-label text-[10px] text-primary mt-1 px-1.5 py-0.5 bg-primary-light rounded">정방향</span>
</div>
</div>

<div class="bg-surface py-3 px-4 rounded-2xl rounded-tl-none shadow-sm border border-default">
<p class="font-body text-sm text-[#1A1523]">점하나가 당신의 카드를 읽고 있어요...</p>
</div>
</section>
<!-- One-line Takeaway -->
<section class="px-4 mb-6">
<div class="bg-primary-light border border-primary/20 rounded-xl p-4 flex gap-3 items-start">
<span class="material-symbols-outlined text-primary shrink-0">auto_awesome</span>
<p class="font-body font-bold text-primary-dark leading-relaxed">
                        변화의 시기를 맞이하고 있어요. 용기를 내볼 때입니다.
                    </p>
</div>
</section>
<!-- Result Sections (Accordion) -->
<section class="px-4 flex flex-col gap-3 mb-8">

<div class="bg-surface rounded-xl border border-default shadow-sm overflow-hidden">

<span class="font-headline font-bold text-[#1A1523]">과거 해석</span>
<span class="material-symbols-outlined text-secondary transition-transform rotate-180">expand_more</span>
</button>
<div class="px-4 pb-4">
<div class="pl-3 border-l-2 border-primary">

</p>
</div>
</div>
</div>
<!-- Collapsed: 현재 해석 -->
<div class="bg-surface rounded-xl border border-default shadow-sm">
<button class="w-full px-4 py-4 flex justify-between items-center text-left">
<span class="font-headline font-bold text-[#1A1523]">현재 해석</span>
<span class="material-symbols-outlined text-secondary">expand_more</span>
</button>
</div>
<!-- Collapsed: 미래 해석 -->
<div class="bg-surface rounded-xl border border-default shadow-sm">
<button class="w-full px-4 py-4 flex justify-between items-center text-left">
<span class="font-headline font-bold text-[#1A1523]">미래 해석</span>
<span class="material-symbols-outlined text-secondary">expand_more</span>
</button>
</div>
<!-- Collapsed: 종합 조언 -->
<div class="bg-surface rounded-xl border border-default shadow-sm">
<button class="w-full px-4 py-4 flex justify-between items-center text-left">
<span class="font-headline font-bold text-[#1A1523]">종합 조언</span>
<span class="material-symbols-outlined text-secondary">expand_more</span>
</button>
</div>
</section>
<!-- Ad Slot -->
<section class="px-4 mb-8">
<div class="bg-ad rounded-xl h-24 flex items-center justify-center border border-default relative">
<span class="absolute top-2 right-2 text-[10px] font-label text-tertiary bg-white/50 px-1.5 py-0.5 rounded">광고</span>
<span class="text-tertiary font-body text-sm">Ad Space</span>
</div>
</section>
</main>
<!-- Bottom Sticky Bar -->
<footer class="sticky bottom-0 left-0 right-0 bg-surface border-t border-default p-4 flex gap-3 z-50">
<button class="flex-1 py-3.5 px-4 rounded-xl border border-default font-label font-bold text-[#1A1523] bg-surface flex justify-center items-center gap-2 hover:bg-surface-elevated transition-colors">

            </button>
<button class="flex-[2] py-3.5 px-4 rounded-xl bg-cta text-white font-label font-bold flex justify-center items-center gap-2 hover:bg-[#A00430] transition-colors shadow-md">

            </button>
