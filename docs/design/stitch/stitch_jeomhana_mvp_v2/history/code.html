<!DOCTYPE html>

        }

<style>

<body class="bg-surface-background text-text-primary antialiased min-h-screen flex flex-col items-center">

<!-- Header -->
<header class="flex items-center justify-between px-4 h-14 bg-surface z-50 border-b border-border sticky top-0">
<button class="text-text-primary p-2 -ml-2 rounded-full hover:bg-primary-light transition-colors active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline text-lg font-bold text-text-primary">히스토리</h1>

<main class="flex-1 overflow-y-auto pb-20 p-4 space-y-6">

<section class="bg-surface rounded-xl p-5 shadow-sm border border-border flex flex-col gap-3">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
<h2 class="font-headline font-bold text-lg text-text-primary">이번 달 4회 리딩</h2>
</div>
<div class="flex flex-wrap gap-2">
<span class="px-3 py-1 bg-pastel-pink text-text-primary rounded-full text-sm font-medium">#연애</span>
<span class="px-3 py-1 bg-pastel-blue text-text-primary rounded-full text-sm font-medium">#직장</span>
<span class="px-3 py-1 bg-pastel-yellow text-text-primary rounded-full text-sm font-medium">#일상</span>
</div>

<span class="px-2 py-0.5 bg-pastel-pink text-text-primary rounded-md text-xs font-bold">연애</span>
<span class="text-xs text-text-tertiary">2026.05.10</span>
</div>
<span class="material-symbols-outlined text-text-tertiary group-hover:text-primary transition-colors">chevron_right</span>
</div>

<div class="flex gap-2 mt-1">

<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">

</div>
<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">

</div>
<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-card-frame">auto_awesome</span>
</div>
</div>
</button>

<div class="flex items-center gap-2">
<span class="px-2 py-0.5 bg-pastel-blue text-text-primary rounded-md text-xs font-bold">직장</span>
<span class="text-xs text-text-tertiary">2026.05.08</span>
</div>
<span class="material-symbols-outlined text-text-tertiary group-hover:text-primary transition-colors">chevron_right</span>
</div>

<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">

</div>
<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-card-frame">trending_up</span>
</div>
<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-card-frame">lightbulb</span>
</div>
</div>
</button>
<!-- Item 3 -->
<button class="w-full bg-surface rounded-xl p-4 shadow-sm border border-border flex flex-col gap-3 hover:bg-primary-light transition-colors text-left group active:scale-[0.98]">
<div class="flex justify-between items-center w-full">
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 bg-pastel-yellow text-text-primary rounded-md text-xs font-bold">일상</span>
<span class="text-xs text-text-tertiary">2026.05.05</span>
</div>
<span class="material-symbols-outlined text-text-tertiary group-hover:text-primary transition-colors">chevron_right</span>
</div>
<h4 class="font-headline font-bold text-base text-text-primary line-clamp-1">오늘 하루의 조언</h4>
<div class="flex gap-2 mt-1">
<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-card-frame">wb_sunny</span>
</div>
</div>
</button>
<!-- Item 4 -->
<button class="w-full bg-surface rounded-xl p-4 shadow-sm border border-border flex flex-col gap-3 hover:bg-primary-light transition-colors text-left group active:scale-[0.98]">
<div class="flex justify-between items-center w-full">
<div class="flex items-center gap-2">
<span class="px-2 py-0.5 bg-pastel-pink text-text-primary rounded-md text-xs font-bold">연애</span>
<span class="text-xs text-text-tertiary">2026.05.01</span>
</div>
<span class="material-symbols-outlined text-text-tertiary group-hover:text-primary transition-colors">chevron_right</span>
</div>

<div class="flex gap-2 mt-1">
<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-card-frame">volunteer_activism</span>
</div>
<div class="w-8 h-12 bg-surface-elevated border border-card-frame rounded-sm flex items-center justify-center">
<span class="material-symbols-outlined text-xs text-card-frame">chat_bubble</span>
</div>
</div>
</button>
</div>

<div class="w-full h-px bg-border my-8"></div>

<h3 class="font-headline font-bold text-lg text-text-primary mb-1">여기는 아직 비어있어요.</h3>
<p class="font-body text-sm text-text-secondary mb-6">점 하나 찍으러 가볼까요?</p>
<button class="bg-secondary text-white font-bold py-3 px-6 rounded-lg shadow-md hover:bg-[#A00430] active:scale-95 transition-all w-full max-w-[200px]">
                    타로 보러 가기
                </button>
</section>
</main>
